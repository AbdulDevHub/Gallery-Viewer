<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gallery Viewer</title>

    <link rel="icon" href="icons/favicon.png">
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="styles/loader.css" />
    <link rel="stylesheet" href="styles/effects.css" />

    <script src="scripts/main.js"></script>
    <script src="scripts/materialize.js"></script>
  </head>

  <body>
    <!-- Gemini Loader -->
    <div id="geminiLoader" class="gemini-loader-container">
      <div class="wrapper">
        <div class="box-wrap">
          <div class="box one"></div>
          <div class="box two"></div>
          <div class="box three"></div>
          <div class="box four"></div>
          <div class="box five"></div>
          <div class="box six"></div>
        </div>
      </div>
      <div class="loader-text">LOADING IMAGES...</div>
      <div class="loader-progress">
        <span id="loaderCurrent">0</span> / <span id="loaderTotal">0</span>
      </div>
    </div>

    <div id="buttonContainer">
      <div>
        <label for="fileInput" class="custom-file-input waves-effect waves-light" title="Add image or video files">Add Files</label>
        <input type="file" id="fileInput" multiple/>
        
        <label for="folderInput" class="custom-file-input waves-effect waves-light" title="Add an entire folder">Add Folder</label>
        <input type="file" id="folderInput" webkitdirectory directory multiple/>
        
        <button id="clearAll" class="waves-effect waves-light" title="Clear all loaded images">Clear</button>
      </div>

      <div>
        <button id="gridToggle" class="waves-effect waves-light selectedGridOption" title="Images per row">1</button>
        <button id="zoomIn" class="waves-effect waves-light" title="Increase grid width">+</button>
        <button id="zoomOut" class="waves-effect waves-light" title="Decrease grid width">-</button>
        <button id="randomize" class="waves-effect waves-light" title="Randomize image order">🎲</button>
        <button id="spotlight" class="waves-effect waves-light" title="Hide Button Bar">💡</button>
        <button id="fullScreen" class="waves-effect waves-light" title="Toggle fullscreen">⛶</button>
      </div>
    </div>

    <div id="imageContainer" class="image-container one-per-row"></div>
    <button id="scrollToTopBtn" class="waves-effect waves-light">⬆</button>

    <div id="mainSideMenu" class="side-menu-base">
      <button class="menu-button waves-effect waves-light" id="mainFullScreen" title="Fullscreen">⛶</button>
      <button class="menu-button waves-effect waves-light" id="mainZoomIn" title="Zoom In">+</button>
      <button class="menu-button waves-effect waves-light" id="mainZoomOut" title="Zoom Out">-</button>

      <div class="page-info">
        <input type="text" id="mainPageInfo" value="0" />
        <div class="page-separator"></div>
        <span id="mainPageTotal">0</span>
      </div>
      <button class="menu-button waves-effect waves-light selectedGridOption" id="mainToggleGap" title="Toggle Row Gap">📏</button>
      <button class="menu-button waves-effect waves-light selectedGridOption" id="toggleImageFill" title="Toggle image fill width">⬌</button>
    </div>

    <div id="overlay">
      <img id="overlayImage">
      <div id="zoomLens"></div>
      <div id="sideMenu" class="side-menu-base">
        <button class="menu-button waves-effect waves-light" id="fullBtn" title="Show image at full width">⛶</button>
        <button class="menu-button waves-effect waves-light" id="eightyBtn" title="Limit image width to 80% (for tall images)">⬍</button>
        <button class="menu-button waves-effect waves-light" id="wideBtn" title="Limit image height to 80% (for wide images)">⬌</button>
        <button class="menu-button waves-effect waves-light selectedGridOption" id="autoBtn" title="Automatically size image">A</button>

        <div class="page-info">
          <input type="text" id="pageInfo" value="1" />
          <div class="page-separator"></div>
          <span id="pageTotal">1</span>
        </div>
        <button id="zoomMode" class="menu-button waves-effect waves-light" title="Toggle zoom mode">🔍</button>
        <button id="saveBtn" class="menu-button waves-effect waves-light" title="Save bookmark">💾</button>
        <button id="closeOverlayBtn" class="menu-button waves-effect waves-light" title="Close overlay">✖</button>
      </div>
    </div>
  </body>
</html>
